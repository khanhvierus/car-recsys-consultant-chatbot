services:
  # PostgreSQL - Data Platform
  postgres:
    image: postgres:15-alpine
    container_name: car-recsys-postgres
    environment:
      POSTGRES_DB: car_recsys
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - car-recsys-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d car_recsys"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgREST - Auto REST API from PostgreSQL
  postgrest:
    image: postgrest/postgrest:latest
    container_name: car-recsys-postgrest
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://admin:admin123@postgres:5432/car_recsys
      PGRST_DB_SCHEMAS: bronze,silver,gold
      PGRST_DB_ANON_ROLE: admin
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      - postgres
    networks:
      - car-recsys-network
    restart: unless-stopped

  # Bytebase - Database Schema Migration & Version Control
  bytebase:
    image: bytebase/bytebase:latest
    container_name: car-recsys-bytebase
    profiles: ["tools"]        # optional — `docker compose --profile tools up bytebase`
    ports:
      - "8080:8080"
    # No PG_URL: bytebase keeps its OWN metadata in the embedded store under
    # /var/opt/bytebase, so it never writes into the car_recsys app database.
    # Add car_recsys as an "instance" inside the Bytebase UI to browse it.
    volumes:
      - bytebase_data:/var/opt/bytebase
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - car-recsys-network
    restart: unless-stopped
    command: --data /var/opt/bytebase --port 8080

  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: car-recsys-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - car-recsys-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 sh -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis - Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: car-recsys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - car-recsys-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car-recsys-backend
    environment:
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/car_recsys
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=car_chatbot_vectors
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - OPENAI_EMBEDDING_MODEL=text-embedding-3-large
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-893613114700-5e57386c5b899286dc2cv2j3d571scah.apps.googleusercontent.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ../datasets:/app/datasets
    depends_on:
      - postgres
      - qdrant
      - redis
    networks:
      - car-recsys-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Vite + React) — production nginx image (same as Cloud Run).
  # Excluded from the default `docker compose up` — for live-reload dev run it on
  # the host with `npm run dev`. Start the built container with `--profile frontend`.
  # backend is proxy-passed dynamically; nginx serves on 8080.
  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car-recsys-frontend
    ports:
      - "3000:8080"
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_HOST=backend
    command: /bin/sh -c "envsubst '$$BACKEND_URL $$BACKEND_HOST' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    depends_on:
      - backend
    networks:
      - car-recsys-network

  # Temporal - workflow orchestration (replaces Airflow)
  # auto-setup creates the temporal databases in the shared postgres on boot.
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: car-recsys-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PWD=admin123
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"          # gRPC — worker + scripts connect here
    networks:
      - car-recsys-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Temporal Web UI — workflows, schedules, history
  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: car-recsys-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
    ports:
      - "8233:8080"          # http://localhost:8233
    networks:
      - car-recsys-network

  # Pipeline worker — Transform + ML workflows (no Chrome).
  # The crawler worker is NOT here: it runs on the host (./run_worker.sh)
  # because cars.com's Turnstile needs real Chrome via Xvfb.
  pipeline-worker:
    build:
      context: ..                          # repo root (needs crawler/ + dbt/)
      dockerfile: crawler/Dockerfile.pipeline
    image: car-pipeline-worker:latest
    container_name: car-recsys-pipeline-worker
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - WAREHOUSE_DSN=postgresql://admin:admin123@postgres:5432/car_recsys
      # dbt connection (profiles.yml reads these)
      - DBT_PG_HOST=postgres
      - DBT_PG_PORT=5432
      - DBT_PG_USER=admin
      - DBT_PG_PASSWORD=admin123
      - DBT_PG_DBNAME=car_recsys
      # ML: embeddings → Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=car_chatbot_vectors
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=text-embedding-3-large
      - OPENAI_EMBEDDING_DIM=3072
      # Bronze: GCS source
      - GCS_BUCKET=${GCS_BUCKET:-incremental_raw}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/adc.json
    volumes:
      # GCS Application Default Credentials (read-only) for load_bronze.
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - car-recsys-network
    restart: unless-stopped

networks:
  car-recsys-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  bytebase_data:
