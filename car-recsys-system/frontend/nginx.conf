server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Reverse-proxy /api to the backend service.
    # Use variables so Nginx resolves the upstream at request time.
    # NGINX_ENVSUBST_FILTER is configured to only replace BACKEND_URL and BACKEND_HOST.
    location /api/ {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host "${BACKEND_HOST}";
        proxy_ssl_server_name on;
        proxy_ssl_name "${BACKEND_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
