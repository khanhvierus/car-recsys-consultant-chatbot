server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Reverse-proxy /api to the backend Cloud Run service (HTTPS upstream).
    # The frontend SPA calls /api/v1/... same-origin; nginx forwards to the
    # backend, so no CORS is needed. Cloud Run routes by the Host header + SNI,
    # so both must be the backend hostname (NOT $host, which would be the
    # frontend domain). Use a variable in proxy_pass so nginx resolves the
    # upstream at request time via the Docker/Cloud Run DNS resolver.
    location /api/ {
        resolver 169.254.169.254 8.8.8.8 valid=30s;
        set $backend "https://car-backend-vtinskoecq-uc.a.run.app";
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host car-backend-vtinskoecq-uc.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name car-backend-vtinskoecq-uc.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
